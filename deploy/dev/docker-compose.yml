services:
  postgres:
    image: postgres:18.3-alpine
    container_name: 0xsignal-postgres
    environment:
      - POSTGRES_DB=0xsignal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "54322:5432"
    networks:
      - oxsignal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d 0xsignal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  oxsignal-network:
    driver: bridge

volumes:
  postgres-data:
